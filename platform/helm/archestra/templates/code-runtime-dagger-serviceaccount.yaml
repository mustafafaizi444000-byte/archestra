{{- if and .Values.archestra.codeRuntime.dagger.managed.enabled .Values.archestra.codeRuntime.dagger.managed.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "archestra-platform.codeRuntimeDaggerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: code-runtime-dagger
  {{- with .Values.archestra.codeRuntime.dagger.managed.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.archestra.codeRuntime.dagger.managed.serviceAccount.automountServiceAccountToken }}
{{- end }}
