{{- $runnerHost := include "archestra-platform.codeRuntimeDaggerRunnerHost" . -}}
{{- if and .Values.archestra.codeRuntime.enabled .Values.archestra.codeRuntime.dagger.rbac.create (hasPrefix "kube-pod://" $runnerHost) }}
{{- $daggerNamespace := include "archestra-platform.codeRuntimeDaggerRbacNamespace" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "archestra-platform.fullname" . }}-code-runtime-dagger
  namespace: {{ $daggerNamespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "archestra-platform.fullname" . }}-code-runtime-dagger
  namespace: {{ $daggerNamespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "archestra-platform.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "archestra-platform.fullname" . }}-code-runtime-dagger
  apiGroup: rbac.authorization.k8s.io
{{- end }}
